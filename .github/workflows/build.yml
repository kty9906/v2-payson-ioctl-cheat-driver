name: Build Driver Online
on: 
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 수동 빌드 버튼 활성화

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Git 128 오류 방지를 위해 전체 이력 로드

      - name: Fix Git Safe Directory
        # 가상 환경 내 보안 정책으로 인한 Git 오류 방지
        run: git config --global --add safe.directory .github/workflows

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Driver
        # 파일명에 공백이 있으므로 반드시 따옴표로 감쌉니다.
        run: |
          msbuild "Payson IOCTL.sln" /p:Configuration=Release /p:Platform=x64

      - name: Upload Driver Artifact (v4)
        uses: actions/upload-artifact@v4
        with:
          name: Driver-Binary-Output
          # 빌드 결과물(.sys, .inf, .pdb)이 있는 경로를 모두 수집합니다.
          path: |
            **/x64/Release/*.sys
            **/x64/Release/*.inf
            **/x64/Release/*.pdb
          if-no-files-found: error
