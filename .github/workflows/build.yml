name: Build Driver Online

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 버튼을 눌러 수동으로 빌드 실행 가능

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 소스 코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. MSBuild 환경 설정 (Visual Studio 빌드 도구)
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 3. 드라이버 빌드 실행
      # 파일명에 공백이 있으므로 반드시 큰따옴표("")를 사용합니다.
      - name: Build Driver
        run: |
          msbuild "Payson IOCTL.sln" /p:Configuration=Release /p:Platform=x64

      # 4. 빌드된 .sys 파일 업로드 (v4 버전)
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Driver-Binary-Output
          # 빌드 결과물이 나올 수 있는 모든 경로에서 .sys, .inf, .pdb 파일을 수집
          path: |
            **/x64/Release/*.sys
            **/x64/Release/*.inf
            **/x64/Release/*.pdb
          if-no-files-found: warn
